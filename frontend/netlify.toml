[build]
  command = "npm run build"
  publish = "build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { REACT_APP_API_URL = "https://your-railway-backend-url/api" }
  
[context.deploy-preview]
  environment = { REACT_APP_API_URL = "https://your-railway-backend-url/api" }

[context.branch-deploy]
  environment = { REACT_APP_API_URL = "https://your-railway-backend-url/api" }
